name: Deploy to Cloudways

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CLOUDWAYS_HOST }}
          username: ${{ secrets.CLOUDWAYS_SSH_USER }}
          key: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          port: ${{ secrets.CLOUDWAYS_SSH_PORT || 22 }}
          script: |
            cd /home/master/applications/${{ secrets.CLOUDWAYS_APP_NAME }}/public_html
            git pull origin main
            npm ci --production=false
            npx prisma generate
            npx prisma db push --skip-generate
            npm run build
            pm2 reload tttgmb-portal || pm2 start ecosystem.config.js && pm2 save
            echo "Deployed at $(date)"
